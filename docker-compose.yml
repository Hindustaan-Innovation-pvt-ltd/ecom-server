version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development # Target the hot-reloading dev environment stage
    container_name: hmarketplace-backend
    restart: always
    expose:
      - "8080"
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NODE_API_PREFIX="/api/v1"
      - PORT=8080
      - CLUSTER_WORKERS=2
      - MONGODB_URI=mongodb://mongodb:27017/hmarketplace?retryWrites=false
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/usr/src/app # Mount source files for live-reload nodemon sync
      - /usr/src/app/node_modules # Prevent host OS node_modules from overriding container packages
      - uploads-data:/usr/src/app/uploads

  nginx:
    image: nginx:1.27-alpine
    container_name: hmarketplace-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  mongodb:
    image: mongo:8.0.5
    container_name: hmarketplace-mongodb
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:8.8-rc1-alpine3.23
    container_name: hmarketplace-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
  uploads-data:
